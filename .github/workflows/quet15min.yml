name: Auto Scan

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch: # <--- Thêm dòng này để tạo nút bấm chạy thủ công

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python main.py
