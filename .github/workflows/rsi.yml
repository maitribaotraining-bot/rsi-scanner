name: RSI Scanner

on:
schedule:
- cron: '30 4 * * 1-5'
- cron: '5 8 * * 1-5'

workflow_dispatch:

jobs:
run-rsi:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'

  - name: Install libraries
    run: pip install -r requirements.txt

  - name: Run scanner
    run: python main.py
```
