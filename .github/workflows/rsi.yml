
(3 dấu huyền)

---

Làm đúng này nha:

1. mở file `rsi.yml`
2. bấm ✏️ Edit
3. xóa TOÀN BỘ
4. dán lại nguyên file này:

:::writing{variant="document" id="92841"}
name: RSI Scanner

on:
  schedule:
    - cron: '30 4 * * 1-5'
    - cron: '5 8 * * 1-5'

  workflow_dispatch:

jobs:
  run-rsi:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python main.py
:::

---

